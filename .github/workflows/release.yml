name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Match release tag to package version
        run: node -e "if ('v' + require('./package.json').version !== process.env.TAG) process.exit(1)"
        env:
          TAG: ${{ github.event.release.tag_name }}
      - name: Stage and verify exact publication archive
        id: package
        shell: bash
        run: |
          archive="$(npm pack --ignore-scripts)"
          test -f "$archive"
          npm publish "$archive" --dry-run --ignore-scripts --access public
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
      - name: Publish staged archive with provenance
        run: npm publish "${{ steps.package.outputs.archive }}" --ignore-scripts --access public --provenance
        env:
          # Remove after the first publish and npm trusted-publisher binding.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
