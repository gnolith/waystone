name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  stage:
    runs-on: ubuntu-latest
    outputs:
      archive: ${{ steps.package.outputs.archive }}
      artifact: ${{ steps.package.outputs.artifact }}
      digest: ${{ steps.package.outputs.digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Match release tag to package version
        run: node -e "if ('v' + require('./package.json').version !== process.env.TAG) process.exit(1)"
        env:
          TAG: ${{ github.event.release.tag_name }}
      - name: Stage and verify exact publication archive
        id: package
        shell: bash
        run: |
          source_archive="$(npm pack --ignore-scripts)"
          test -f "$source_archive"
          version="$(node -p "require('./package.json').version")"
          digest="$(sha256sum "$source_archive" | cut -d ' ' -f 1)"
          archive="waystone-${version}-${digest}.tgz"
          mv -- "$source_archive" "$archive"
          npm publish "$archive" --dry-run --ignore-scripts --access public
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "artifact=waystone-${digest}" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Upload content-addressed publication archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    needs: stage
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Download content-addressed publication archive
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.stage.outputs.artifact }}
          path: ${{ runner.temp }}/waystone-package
      - name: Revalidate publication archive
        id: verify
        shell: bash
        env:
          EXPECTED_ARCHIVE: ${{ needs.stage.outputs.archive }}
          EXPECTED_DIGEST: ${{ needs.stage.outputs.digest }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            exit 1
          fi
          expected_name='@gnolith/waystone'
          expected_version="${RELEASE_TAG#v}"
          test "$EXPECTED_ARCHIVE" = "waystone-${expected_version}-${EXPECTED_DIGEST}.tgz"
          root="$RUNNER_TEMP/waystone-package"
          test "$(find "$root" -mindepth 1 -maxdepth 1 | wc -l)" -eq 1
          archive="$root/$EXPECTED_ARCHIVE"
          test -f "$archive"
          test ! -L "$archive"
          archive="$(realpath "$archive")"
          case "$archive" in "$root"/*) ;; *) exit 1 ;; esac
          test "$(basename "$archive")" = "$EXPECTED_ARCHIVE"
          test "$(sha256sum "$archive" | cut -d ' ' -f 1)" = "$EXPECTED_DIGEST"
          python3 - "$archive" "$expected_name" "$expected_version" <<'PY'
          import json
          import posixpath
          import sys
          import tarfile
          import unicodedata

          archive, expected_name, expected_version = sys.argv[1:]
          seen = set()
          manifest_member = None

          with tarfile.open(archive, "r:gz") as package:
              members = package.getmembers()
              for member in members:
                  name = member.name
                  parts = name.split("/")
                  if name.startswith("/") or posixpath.isabs(name):
                      raise SystemExit("Archive member path is absolute.")
                  if ".." in parts or "." in parts or "" in parts:
                      raise SystemExit("Archive member path contains traversal or ambiguous components.")
                  if "\\" in name:
                      raise SystemExit("Archive member path contains a backslash.")
                  if any(unicodedata.category(character) == "Cc" for character in name):
                      raise SystemExit("Archive member path contains a control character.")
                  if not name.startswith("package/"):
                      raise SystemExit("Archive member is outside package/.")
                  if name in seen:
                      raise SystemExit("Duplicate archive member path.")
                  seen.add(name)
                  if not member.isfile():
                      raise SystemExit("Archive contains a symlink or non-regular member.")
                  if name == "package/package.json":
                      if manifest_member is not None:
                          raise SystemExit("Archive must contain exactly one regular package/package.json.")
                      manifest_member = member

              if manifest_member is None:
                  raise SystemExit("Archive must contain exactly one regular package/package.json.")
              manifest_file = package.extractfile(manifest_member)
              if manifest_file is None:
                  raise SystemExit("Unable to read validated package/package.json.")
              manifest = json.load(manifest_file)

          if manifest.get("name") != expected_name:
              raise SystemExit("Package name does not match the literal expected package.")
          if manifest.get("version") != expected_version:
              raise SystemExit("Package version does not match the validated release tag.")
          PY
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
      - name: Publish revalidated archive with provenance
        run: npm publish "$ARCHIVE" --ignore-scripts --access public --provenance
        env:
          ARCHIVE: ${{ steps.verify.outputs.archive }}
